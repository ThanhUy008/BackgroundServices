version: "3.9"

services:
  client-postgres:
    image: postgres:17.5
    container_name: client-postgres-db
    restart: on-failure

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clientdb
      TZ: UTC

    ports:
      - "5432:5432"

    volumes:
      - client-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clientdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-postgres:
    image: postgres:17.5
    container_name: app-postgres-db
    restart: on-failure

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
      TZ: UTC

    ports:
      - "5433:5432"

    volumes:
      - app-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  client-postgres-data:
  app-postgres-data: