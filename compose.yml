version: "3.9"

services:
  client-postgres:
    image: postgres:17.5
    container_name: client-postgres-db
    restart: on-failure

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clientdb
      TZ: UTC

    ports:
      - "5434:5432"

    volumes:
      - client-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clientdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-postgres:
    image: postgres:17.5
    container_name: app-postgres-db
    restart: on-failure

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
      TZ: UTC

    ports:
      - "5433:5432"

    volumes:
      - app-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  change-tracker-migration:
    build:
      context: .
      dockerfile: Solution/ChangeTracker/Dockerfile-migrate
      args:
        dotnetToolVersion: 8.0.0
    container_name: change-tracker-migration
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CustomerDb: "Host=client-postgres;Port=5432;Database=clientdb;Username=postgres;Password=postgres;"
      ConnectionStrings__AppDb: "Host=app-postgres;Port=5432;Database=appdb;Username=postgres;Password=postgres;"
    depends_on:
      client-postgres:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
    restart: "no"

  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1",
        ]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-topic-init:
    image: apache/kafka:latest
    container_name: kafka-topic-init
    depends_on:
      kafka:
        condition: service_healthy

    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        echo "Creating Kafka topic..."

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic customer-changes \
          --partitions 3 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic item-changes \
          --partitions 3 \
          --replication-factor 1

        echo "Describing Kafka topic..."

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --describe \
          --topic customer-changes

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --describe \
          --topic item-changes

    restart: "no"

  change-tracker:
    build:
      context: .
      dockerfile: Solution/ChangeTracker/Dockerfile
    container_name: change-tracker
    restart: on-failure

    environment:
      Kafka__BootstrapServers: kafka:29092
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Warning
      ConnectionStrings__CustomerDb: "Host=client-postgres;Port=5432;Database=clientdb;Username=postgres;Password=postgres;"
      ConnectionStrings__AppDb: "Host=app-postgres;Port=5432;Database=appdb;Username=postgres;Password=postgres;"
    volumes:
      - ./Solution/ChangeTracker/appsettings.json:/app/appsettings.json:ro
    mem_limit: 100m
    depends_on:
      client-postgres:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      change-tracker-migration:
        condition: service_completed_successfully
volumes:
  client-postgres-data:
  app-postgres-data:
  kafka-data:
