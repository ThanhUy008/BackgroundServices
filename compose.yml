  change-tracker:
    build:
      context: .
      dockerfile: Solution/ChangeTracker/Dockerfile
    container_name: change-tracker
    restart: on-failure

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Warning
      ConnectionStrings__CustomerDb: "Host=client-postgres;Port=5432;Database=clientdb;Username=postgres;Password=postgres;"
      ConnectionStrings__AppDb: "Host=app-postgres;Port=5432;Database=appdb;Username=postgres;Password=postgres;"
    mem_limit: 100m
    depends_on:
      client-postgres:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      change-tracker-migration:
        condition: service_completed_successfully
